<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  /* ------------------------------------------------------------------ */
  /* Layout and style defaults — edit these values to customise.         */
  /* ------------------------------------------------------------------ */
  :root {
    --font:             'Courier New', monospace;

    /* Leaderboard */
    --lb-width:         310px;
    --lb-font-size:     40px;
    --lb-font-colour:   #ffffff;
    --lb-row-bg:        rgba(26, 26, 26, 0.60);
    --lb-row-bg-alt:    rgba(26, 26, 26, 0.60);  /* same = no alternating rows */
    --lb-header-bg:     rgba(26, 26, 26, 0.60);
    --lb-row-height:    54px;
    --lb-pad-v:         4px;
    --lb-pad-h:         6px;
    --lb-radius:        0px;

    /* Level history */
    --lh-font-size:     20px;
    --lh-font-colour:   #ffffff;
    --lh-bg:            rgba(0, 0, 0, 0.75);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: var(--font);
    font-size: 14px;
    color: #ffffff;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /*
   * Grid: leaderboard in the right column, level history along the bottom.
   * To move a pane, change grid-area on the pane and adjust the track sizes.
   *   columns: left | center | right
   *   rows:    top  | center | bottom
   */
  #overlay-grid {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-areas:
      "top    top    top"
      "left   center right"
      "bottom bottom bottom";
    grid-template-columns: 0 1fr var(--lb-width);
    grid-template-rows:    0 1fr fit-content(40vh);
    overflow: hidden;
  }

  /* ---- Leaderboard pane ---- */
  #leaderboard-pane {
    grid-area: right;
    overflow: hidden;
    border-radius: var(--lb-radius);
  }

  #status {
    background: rgba(0, 0, 0, 0.60);
    color: #aaaaaa;
    font-size: 11px;
    padding: 6px 10px;
    text-align: center;
    letter-spacing: 0.06em;
  }

  #leaderboard {
    width: 100%;
    border-collapse: collapse;
    table-layout: auto;
  }

  #leaderboard thead tr  { background: var(--lb-header-bg); }

  #leaderboard thead th {
    color: var(--lb-font-colour);
    font-size: var(--lb-font-size);
    font-weight: normal;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: var(--lb-pad-v) var(--lb-pad-h);
    text-align: center;
    white-space: nowrap;
  }

  #leaderboard thead th.name { text-align: center; width: 100%; }

  #leaderboard tbody tr {
    background: var(--lb-row-bg);
    height: var(--lb-row-height);
  }

  #leaderboard tbody tr:nth-child(odd) { background: var(--lb-row-bg-alt); }

  #leaderboard tbody td {
    padding: var(--lb-pad-v) var(--lb-pad-h);
    vertical-align: middle;
    white-space: nowrap;
    text-align: center;
    font-size: var(--lb-font-size);
    color: var(--lb-font-colour);
  }

  #leaderboard tbody td.name {
    text-align: left;
    width: 100%;
    max-width: 0;
    overflow: hidden;
    text-overflow: clip;
    font-weight: bold;
    color: #ffffff;
    padding-right: 10px;
  }

  /* ---- Level history pane ---- */
  #level-history-pane {
    grid-area: bottom;
    background: var(--lh-bg);
    display: none;
  }

  #level-history {
    width: 100%;
    border-collapse: collapse;
    table-layout: auto;
  }

  #level-history thead th {
    color: #aaaaaa;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 8px 1px;
    text-align: center;
    white-space: nowrap;
  }

  #level-history tbody td {
    color: var(--lh-font-colour);
    font-size: var(--lh-font-size);
    padding: 2px 8px;
    text-align: center;
    white-space: nowrap;
  }

  #level-history tbody tr.total-row td {
    border-top: 1px solid rgba(255, 255, 255, 0.25);
    font-weight: bold;
  }
</style>
</head>
<body>

  <div id="overlay-grid">

    <div id="leaderboard-pane">
      <div id="status">Waiting for game...</div>
      <table id="leaderboard">
        <thead>
          <tr>
            <th>#</th>
            <th class="name">Player</th>
            <th>P</th>
            <th>S</th>
            <th>R</th>
          </tr>
        </thead>
        <tbody id="lb-body"></tbody>
      </table>
    </div>

    <div id="level-history-pane">
      <table id="level-history">
        <thead>
          <tr>
            <th>Level</th>
            <th>Time</th>
            <th>Saved</th>
            <th>Points</th>
          </tr>
        </thead>
        <tbody id="lh-body"></tbody>
      </table>
    </div>

  </div>

<script>
  const POLL_INTERVAL = 2000;
  const HISTORY_ROWS  = 5;

  let rowCount      = null;
  let lastLhVisible = false;
  let lastStatus    = null;

  // Measures how many leaderboard rows fit in the available pane height.
  // Called lazily on first render and whenever the pane height changes.
  // IMPORTANT: the test row cell count must match the <thead> column count.
  // If you add or remove a column in the HTML, update this line to match.
  function calcRowCount() {
    const panel     = document.getElementById('leaderboard-pane');
    const thead     = document.querySelector('#leaderboard thead');
    const available = panel.clientHeight - thead.offsetHeight;
    const tbody     = document.getElementById('lb-body');
    const test      = document.createElement('tr');
    test.innerHTML  = '<td>1</td><td class="name">x</td><td>0</td><td>0</td><td>0</td>';  // 5 cols: #, Player, P, S, R
    tbody.appendChild(test);
    const rowH = test.offsetHeight || 54;
    tbody.removeChild(test);
    return Math.max(1, Math.floor(available / rowH));
  }

  // Column order here must match the <thead> order: #, Player, P (exp), S (survived), R (played).
  // If you reorder or rename columns in the HTML, update the field mapping below to match.
  function renderRows(players) {
    const limit = rowCount || (rowCount = calcRowCount());
    const tbody = document.getElementById('lb-body');
    tbody.innerHTML = '';
    for (let i = 0; i < limit; i++) {
      const p  = players[i];
      const tr = document.createElement('tr');
      if (p) {
        tr.innerHTML =
          `<td>${i + 1}</td>` +
          `<td class="name">${escHtml(p.display_name)}</td>` +
          `<td>${p.exp_earned}</td>` +
          `<td>${p.levels_survived}</td>` +
          `<td>${p.levels_played}</td>`;
      } else {
        tr.innerHTML = '<td></td><td class="name"></td><td></td><td></td><td></td>';
      }
      tbody.appendChild(tr);
    }
  }

  function formatLevelTime(t) {
    if (t === null || t === undefined) return '—';
    const m = Math.floor(t / 60).toString().padStart(2, '0');
    const s = (t % 60).toFixed(3).padStart(6, '0');
    return `${m}:${s}`;
  }

  function formatGameTime(started_at, ended_at, server_time, isActive) {
    if (!started_at) return '—';
    const start = new Date(started_at).getTime();
    const end   = isActive ? new Date(server_time).getTime() : new Date(ended_at).getTime();
    if (isNaN(start) || isNaN(end)) return '—';
    const sec = Math.max(0, Math.floor((end - start) / 1000));
    const h   = Math.floor(sec / 3600);
    const m   = Math.floor((sec % 3600) / 60);
    const s   = sec % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  function renderLevelHistory(data) {
    const tbody  = document.getElementById('lh-body');
    const isActive = data.status === 'active';
    const totals   = data.run_totals;

    tbody.innerHTML = '';

    const rows = (data.run_history || []).slice(0, HISTORY_ROWS).slice().reverse();
    for (const lvl of rows) {
      const pct = lvl.total_players > 0
        ? Math.round(lvl.survivors / lvl.total_players * 100) : 0;
      const tr = document.createElement('tr');
      tr.innerHTML =
        `<td>${lvl.level_number}</td>` +
        `<td>${formatLevelTime(lvl.elapsed_time)}</td>` +
        `<td>${lvl.survivors}/${lvl.total_players} (${pct}%)</td>` +
        `<td>${lvl.level_exp !== null ? lvl.level_exp : '—'}</td>`;
      tbody.appendChild(tr);
    }

    if (totals) {
      const pct = totals.total_players > 0
        ? Math.round(totals.total_survivors / totals.total_players * 100) : 0;
      const tr = document.createElement('tr');
      tr.className = 'total-row';
      tr.innerHTML =
        `<td>${totals.level_count > 0 ? totals.level_count : '—'}</td>` +
        `<td>${formatGameTime(totals.run_started_at, totals.run_ended_at, data.server_time, isActive)}</td>` +
        `<td>${totals.total_survivors}/${totals.total_players} (${pct}%)</td>` +
        `<td>${totals.total_exp}</td>`;
      tbody.appendChild(tr);
    }
  }

  async function refresh() {
    let data;
    try {
      const resp = await fetch('/api/state');
      if (!resp.ok) return;
      data = await resp.json();
    } catch (_) { return; }

    const statusDiv = document.getElementById('status');
    const lhPane    = document.getElementById('level-history-pane');

    if (data.status === 'waiting') {
      if (lastStatus !== 'waiting') { rowCount = null; lastStatus = 'waiting'; }
      renderRows([]);
      lhPane.style.display    = 'none';
      statusDiv.style.display = 'block';
      statusDiv.textContent   = 'Waiting for game...';
      return;
    }

    // Status bar shows for idle, hides for active — height change requires row recalc.
    if (data.status !== lastStatus) { rowCount = null; lastStatus = data.status; }

    statusDiv.textContent   = data.status === 'idle' ? 'PREVIOUS SESSION' : '';
    statusDiv.style.display = data.status === 'idle' ? 'block' : 'none';

    const history   = data.run_history || [];
    const hasTotals = data.run_totals && data.run_totals.level_count > 0;
    const lhVisible = history.length > 0 || hasTotals;

    // Level history visibility changes the leaderboard's available height.
    if (lhVisible !== lastLhVisible) { lastLhVisible = lhVisible; rowCount = null; }

    if (lhVisible) {
      renderLevelHistory(data);
      lhPane.style.display = 'block';
    } else {
      lhPane.style.display = 'none';
    }

    renderRows(data.run_leaderboard || []);
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // setTimeout (not setInterval) ensures each tick completes before the next
  // starts, preventing overlapping fetches on slow connections.
  async function tick() {
    await refresh();
    setTimeout(tick, POLL_INTERVAL);
  }

  tick();
</script>
</body>
</html>
