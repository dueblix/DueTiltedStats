<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;700&family=Roboto+Mono:wght@400;700&family=JetBrains+Mono:wght@400;700&family=Fira+Code:wght@400;700&family=Space+Mono:wght@400;700&family=Inconsolata:wght@400;700&family=IBM+Plex+Mono:wght@400;700&family=Barlow+Condensed:wght@400;700&family=Oswald:wght@400;700&family=Rajdhani:wght@400;600&family=Chakra+Petch:wght@400;700&family=Exo+2:wght@400;700&family=Bebas+Neue&family=Roboto:wght@400;700&family=Inter:wght@400;700&family=Lato:wght@400;700&family=Montserrat:wght@400;700&family=Open+Sans:wght@400;700&family=Nunito:wght@400;700&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    --font-family: 'Courier New', monospace;
    --panel-width: 310px;
    --panel-opacity: 0.6;   /* used by #status background; rows use hexToRgba() instead */
    --row-font-size: 40px;
    --row-font-colour: #ffffff;
    --header-font-size: 40px;
    --header-font-colour: #ffffff;
    --row-bg: #1a1a1a;
    --row-bg-alt: #2a2a2a;
    --row-separator: none;
    --header-text-transform: uppercase;
    --header-font-weight: normal;
    --row-height: 54px;
    --cell-padding-v: 4px;
    --cell-padding-h: 6px;
    --panel-border-radius: 0px;
    --bottom-bar-opacity: 0.75;
    --bottom-bar-font-size: 20px;
    --bottom-bar-font-colour: #ffffff;

    background: transparent;
    font-family: var(--font-family);
    font-size: 14px;
    color: #ffffff;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* ---- Right panel: leaderboard ---- */
  #right-panel {
    position: absolute;
    top: 0;
    bottom: 0;
    right: 0;
    width: var(--panel-width);
    z-index: 1;
    border-radius: var(--panel-border-radius);
    overflow: hidden;
  }

  #status {
    background: rgba(0, 0, 0, var(--panel-opacity));
    color: #aaaaaa;
    font-size: 11px;
    padding: 6px 10px;
    text-align: center;
    letter-spacing: 0.06em;
  }

  #leaderboard {
    width: 100%;
    border-collapse: collapse;
    table-layout: auto;
  }

  #leaderboard thead tr {
    background: var(--header-bg);
  }

  #leaderboard thead th {
    color: var(--header-font-colour);
    font-size: var(--header-font-size);
    font-weight: var(--header-font-weight);
    text-transform: var(--header-text-transform);
    letter-spacing: 0.1em;
    padding: var(--cell-padding-v) var(--cell-padding-h);
    text-align: center;
    white-space: nowrap;
  }

  #leaderboard thead th.name {
    text-align: center;
    width: 100%;
  }

  #leaderboard tbody tr {
    background: var(--row-bg);
    border-bottom: var(--row-separator);
    height: var(--row-height);
  }

  #leaderboard tbody tr:nth-child(odd) {
    background: var(--row-bg-alt);
  }

  #leaderboard tbody td {
    padding: var(--cell-padding-v) var(--cell-padding-h);
    vertical-align: middle;
    white-space: nowrap;
    text-align: center;
    font-size: var(--row-font-size);
    color: var(--row-font-colour);
  }

  #leaderboard tbody td.name {
    text-align: left;
    width: 100%;
    max-width: 0;
    overflow: hidden;
    text-overflow: clip;
    font-size: var(--row-font-size);
    font-weight: bold;
    color: #ffffff;
    padding-right: 10px;
  }

  /* ---- Bottom bar: level history table ---- */
  #bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0, 0, 0, var(--bottom-bar-opacity));
    display: none;
  }

  #level-history {
    width: 100%;
    border-collapse: collapse;
    table-layout: auto;
  }

  #level-history thead th {
    color: #aaaaaa;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 8px 1px;
    text-align: center;
    white-space: nowrap;
  }

  #level-history tbody td {
    color: var(--bottom-bar-font-colour);
    font-size: var(--bottom-bar-font-size);
    padding: 2px 8px;
    text-align: center;
    white-space: nowrap;
  }

  #level-history tbody tr.total-row td {
    border-top: 1px solid rgba(255,255,255,0.25);
    font-weight: bold;
  }
</style>
</head>
<body>

  <div id="right-panel">
    <div id="status">Waiting for game...</div>
    <table id="leaderboard">
      <thead>
        <tr id="lb-head"></tr>
      </thead>
      <tbody id="lb-body"></tbody>
    </table>
  </div>

  <div id="bottom-bar">
    <table id="level-history">
      <thead><tr id="lh-head"></tr></thead>
      <tbody id="lh-body"></tbody>
    </table>
  </div>

<script>
  const POLL_INTERVAL = 2000;

  let rowCount = null;
  let activeColumns = [];  // [{key, label}] for visible leaderboard columns in order
  let activeCells = [];    // [{key, label}] for visible bottom-bar cells in order
  let currentConfig = null;
  let lastLayoutSig = null;   // detects layout-affecting leaderboard config changes
  let lastBbLayoutSig = null; // detects bottom-bar cell/font changes

  function layoutSig(lb) {
    // Captures fields that affect row height or column structure, so the header
    // and rowCount are rebuilt only when something layout-relevant changes.
    //   font_size        — body row height
    //   headerFontSize   — thead height (header_font_override may differ from body)
    //   row_height       — explicit row height override
    //   cell_padding_v   — vertical padding affects row height
    //   cols             — visible column set and labels
    // Excluded: panel_width, colours, opacity, text-transform — none affect row height.
    const hdr = lb.header_font_override || {};
    const headerFontSize = hdr.enabled ? hdr.font_size : lb.font_size;
    const cols = lb.columns.filter(c => c.visible).map(c => `${c.key}:${c.label}`).join(',');
    return `${lb.font_size}|${headerFontSize}|${lb.row_height}|${lb.cell_padding_v}|${cols}`;
  }

  function bbLayoutSig(bb) {
    const cells = (bb.cells || []).filter(c => c.visible).map(c => `${c.key}:${c.label}`).join(',');
    return `${bb.font_size}|${cells}`;
  }

  // Maps each config column key to the matching field name in the /api/state
  // player objects. When a new column type is added to DEFAULT_CONFIG, a
  // corresponding entry must be added here AND the /api/state route must
  // include that field in each player dict.
  // 'rank' and 'name' are handled by explicit branches in renderRows; only
  // data columns that map to a player-object field belong here.
  const COL_FIELD = {
    points:   'exp_earned',
    survived: 'levels_survived',
    races:    'levels_played',
  };

  // Lighten each RGB channel by 16/255 (~6%) to produce the automatic
  // alternating row colour when row_background_alt.enabled is false.
  // Fallback '#2a2a2a' matches the default alt colour in DEFAULT_CONFIG.
  function deriveAltColour(hex) {
    if (!hex || hex.length < 7) return '#2a2a2a';
    const r = Math.min(255, parseInt(hex.slice(1, 3), 16) + 16);
    const g = Math.min(255, parseInt(hex.slice(3, 5), 16) + 16);
    const b = Math.min(255, parseInt(hex.slice(5, 7), 16) + 16);
    return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
  }

  function hexToRgba(hex, alpha) {
    if (!hex || hex.length < 7) return `rgba(0,0,0,${alpha})`;
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  async function applyConfig() {
    let cfg;
    try {
      const resp = await fetch('/api/config');
      if (!resp.ok) return;
      cfg = await resp.json();
    } catch (_) {
      return;
    }

    currentConfig = cfg;
    const body = document.body;
    const lb   = cfg.leaderboard;
    const bb   = cfg.bottom_bar;

    // leaderboard.enabled is config-only: hide the panel regardless of game state.
    // (bottom_bar.enabled is handled in refresh() where game state is also checked.)
    document.getElementById('right-panel').style.display = lb.enabled ? '' : 'none';

    // --- Global + leaderboard layout ---
    body.style.setProperty('--font-family',     cfg.global.font_family);
    body.style.setProperty('--panel-width',      lb.panel_width + 'px');
    body.style.setProperty('--panel-opacity',    lb.opacity);
    body.style.setProperty('--row-font-size',    lb.font_size + 'px');
    body.style.setProperty('--row-font-colour',  lb.font_colour);

    // --- Header font: use override values when enabled, else inherit from row ---
    // Guard with || {} so a missing nested object degrades to body values.
    const hdr = lb.header_font_override || {};
    body.style.setProperty('--header-font-size',
        (hdr.enabled ? hdr.font_size : lb.font_size) + 'px');
    body.style.setProperty('--header-font-colour',
        hdr.enabled ? hdr.font_colour : lb.font_colour);

    // --- Row backgrounds ---
    const rowBg  = lb.row_background_colour;
    const altCfg = lb.row_background_alt || {};
    const altHex     = altCfg.enabled ? altCfg.colour               : rowBg;
    const altOpacity = altCfg.enabled ? (altCfg.opacity ?? lb.opacity) : lb.opacity;
    body.style.setProperty('--row-bg',     hexToRgba(rowBg,  lb.opacity));
    body.style.setProperty('--row-bg-alt', hexToRgba(altHex, altOpacity));

    // --- Header background ---
    const hdrBgHex     = hdr.enabled ? (hdr.bg_colour  || '#000000') : rowBg;
    const hdrBgOpacity = hdr.enabled ? (hdr.bg_opacity ?? lb.opacity) : lb.opacity;
    body.style.setProperty('--header-bg', hexToRgba(hdrBgHex, hdrBgOpacity));

    body.style.setProperty('--row-separator',
        lb.row_separator === 'line' ? '1px solid rgba(255,255,255,0.1)' : 'none');
    body.style.setProperty('--header-text-transform', lb.header_text_transform || 'uppercase');
    body.style.setProperty('--header-font-weight',    lb.header_font_weight    || 'normal');
    body.style.setProperty('--row-height',            (lb.row_height           ?? 54) + 'px');
    body.style.setProperty('--cell-padding-v',        (lb.cell_padding_v       ?? 4)  + 'px');
    body.style.setProperty('--cell-padding-h',        (lb.cell_padding_h       ?? 6)  + 'px');
    body.style.setProperty('--panel-border-radius',   (lb.panel_border_radius  ?? 0)  + 'px');

    // --- Bottom bar ---
    body.style.setProperty('--bottom-bar-opacity',      bb.opacity);
    body.style.setProperty('--bottom-bar-font-size',    bb.font_size + 'px');
    body.style.setProperty('--bottom-bar-font-colour',  bb.font_colour);

    // Rebuild leaderboard column header and reset row count only when layout actually changed
    const sig = layoutSig(lb);
    if (sig !== lastLayoutSig) {
      lastLayoutSig  = sig;
      activeColumns  = lb.columns.filter(c => c.visible);
      const headRow  = document.getElementById('lb-head');
      headRow.innerHTML = '';
      for (const col of activeColumns) {
        const th = document.createElement('th');
        th.textContent = col.label;
        if (col.key === 'name') th.className = 'name';
        headRow.appendChild(th);
      }
      rowCount = null;
    }

    // Rebuild bottom-bar table header when cells or font change
    const bbSig = bbLayoutSig(bb);
    if (bbSig !== lastBbLayoutSig) {
      lastBbLayoutSig = bbSig;
      activeCells = (bb.cells || []).filter(c => c.visible);
      const lhHead = document.getElementById('lh-head');
      lhHead.innerHTML = '';
      for (const cell of activeCells) {
        const th = document.createElement('th');
        th.textContent = cell.label;
        lhHead.appendChild(th);
      }
    }
  }

  function calcRowCount() {
    const panel    = document.getElementById('right-panel');
    const thead    = document.querySelector('#leaderboard thead tr');
    const available = panel.clientHeight - thead.offsetHeight;
    const tbody    = document.getElementById('lb-body');
    // Insert a representative row to measure its rendered height, then remove it.
    const test     = document.createElement('tr');
    test.innerHTML = activeColumns.map(col =>
      col.key === 'name' ? '<td class="name">x</td>' : '<td>0</td>'
    ).join('');
    tbody.appendChild(test);
    const rowH = test.offsetHeight || currentConfig?.leaderboard?.row_height || 54;
    tbody.removeChild(test);
    return Math.max(1, Math.floor(available / rowH));
  }

  function renderRows(players) {
    if (!rowCount) rowCount = calcRowCount();
    const tbody = document.getElementById('lb-body');
    tbody.innerHTML = '';
    for (let i = 0; i < rowCount; i++) {
      const p = players[i];
      const tr = document.createElement('tr');
      if (p) {
        tr.innerHTML = activeColumns.map(col => {
          if (col.key === 'name') return `<td class="name" style="color:${p.colour}">${escHtml(p.display_name)}</td>`;
          if (col.key === 'rank') return `<td>${i + 1}</td>`;
          const field = COL_FIELD[col.key];
          return `<td>${field !== undefined ? p[field] : ''}</td>`;
        }).join('');
      } else {
        tr.innerHTML = activeColumns.map(col =>
          col.key === 'name' ? '<td class="name"></td>' : '<td></td>'
        ).join('');
      }
      tbody.appendChild(tr);
    }
  }

  function formatLevelTime(elapsed_time) {
    if (elapsed_time === null || elapsed_time === undefined) return '—';
    const m = Math.floor(elapsed_time / 60).toString().padStart(2, '0');
    const s = (elapsed_time % 60).toFixed(3).padStart(6, '0');
    return `${m}:${s}`;
  }

  function formatGameTime(started_at, ended_at, server_time, isActive) {
    if (!started_at) return '—';
    const start = new Date(started_at).getTime();
    const end = isActive ? new Date(server_time).getTime() : new Date(ended_at).getTime();
    if (isNaN(start) || isNaN(end)) return '—';
    const totalSec = Math.max(0, Math.floor((end - start) / 1000));
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }

  function formatCell(key, lvl) {
    if (key === 'level') return lvl.level_number;
    if (key === 'time')  return formatLevelTime(lvl.elapsed_time);
    if (key === 'saved') {
      const pct = lvl.total_players > 0
        ? Math.round(lvl.survivors / lvl.total_players * 100) : 0;
      return `${lvl.survivors}/${lvl.total_players} (${pct}%)`;
    }
    if (key === 'points') return lvl.level_exp !== null ? lvl.level_exp : '—';
    return '—';
  }

  function renderLevelHistory(data) {
    const bb = currentConfig.bottom_bar;
    const tbody = document.getElementById('lh-body');
    tbody.innerHTML = '';

    let rows = (data.run_history || []).slice(0, bb.history_rows ?? 5);
    if (bb.recent_at_bottom !== false) rows = rows.slice().reverse();

    for (const lvl of rows) {
      const tr = document.createElement('tr');
      tr.innerHTML = activeCells.map(c => `<td>${formatCell(c.key, lvl)}</td>`).join('');
      tbody.appendChild(tr);
    }

    if ((bb.show_total_row !== false) && data.run_totals) {
      const tot = data.run_totals;
      const isActive = data.status === 'active';
      const tr = document.createElement('tr');
      tr.className = 'total-row';
      tr.innerHTML = activeCells.map(c => {
        let val;
        if (c.key === 'level') {
          val = tot.level_count > 0 ? tot.level_count : '—';
        } else if (c.key === 'time') {
          val = formatGameTime(tot.run_started_at, tot.run_ended_at, data.server_time, isActive);
        } else if (c.key === 'saved') {
          const pct = tot.total_players > 0
            ? Math.round(tot.total_survivors / tot.total_players * 100) : 0;
          val = `${tot.total_survivors}/${tot.total_players} (${pct}%)`;
        } else if (c.key === 'points') {
          val = tot.total_exp;
        } else {
          val = '—';
        }
        return `<td>${val}</td>`;
      }).join('');
      tbody.appendChild(tr);
    }
  }

  async function refresh() {
    let data;
    try {
      const resp = await fetch('/api/state');
      if (!resp.ok) return;
      data = await resp.json();
    } catch (_) {
      return;
    }

    const statusDiv = document.getElementById('status');
    const bottomBar = document.getElementById('bottom-bar');

    if (data.status === 'waiting') {
      renderRows([]);
      bottomBar.style.display = 'none';
      statusDiv.style.display = 'block';
      statusDiv.textContent   = 'Waiting for game...';
      return;
    }

    const showLabel = currentConfig?.leaderboard?.show_session_label !== false;
    statusDiv.textContent   = data.status === 'idle' ? 'PREVIOUS SESSION' : '';
    statusDiv.style.display = data.status === 'idle' && showLabel ? 'block' : 'none';

    // --- Bottom bar ---
    // Show when config enables it AND there is history data to display.
    // currentConfig is null only if applyConfig hasn't succeeded yet on first tick.
    const history = data.run_history || [];
    const hasTotals = data.run_totals && data.run_totals.level_count > 0;
    if (currentConfig?.bottom_bar.enabled && (history.length > 0 || hasTotals)) {
      renderLevelHistory(data);
      bottomBar.style.display = 'block';
    } else {
      bottomBar.style.display = 'none';
    }

    // --- Leaderboard ---
    renderRows(data.run_leaderboard || []);
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // applyConfig must complete before refresh: refresh reads activeColumns
  // (set by applyConfig) to build leaderboard rows. setTimeout (not setInterval)
  // ensures the next tick only starts after the current one finishes, preventing
  // concurrent ticks from interleaving DOM writes on slow connections.
  async function tick() {
    await applyConfig();
    await refresh();
    setTimeout(tick, POLL_INTERVAL);
  }

  tick();
</script>
</body>
</html>
